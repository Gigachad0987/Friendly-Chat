{% extends "base.html" %}
{% block Chats %}

<div class="sidebar-header">
  <h1>Chats</h1>
  <form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit">Log out</button>
  </form>
</div>

<div class="sb-search">
  <form method="get">
    <input type="text" name="chat_name" placeholder="Search" value="{{ request.GET.chat_name|default:'' }}">
    <button type="submit">Search</button>
  </form>
</div>

<div class="chat-list">
    {% if Chats %}
      {% for chat in Chats %}
      <a class="chat-item"
         href="{% url 'ChatInfo' chat.pk %}"
         data-initials="{% if chat.user_2 == user %}{{ chat.user_1.username|slice:':1' }}{% else %}{{ chat.user_2.username|slice:':1' }}{% endif %}">
        {% if chat.user_2 == user %}
          {{ chat.user_1.username }}
        {% else %}
          {{ chat.user_2.username }}
        {% endif %}
      </a>
      {% endfor %}
    {% else %}
      <p style="color:#7a8fa6; padding: 20px; text-align:center;">Empty</p>
    {% endif %}
  </div>

<hr>

<div class="new-chat">
  <div class="new-chat-label">New chat</div>
  <a href="{% url 'UserSearch' %}">Find users</a>
</div>

{% endblock %}
